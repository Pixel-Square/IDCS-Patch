# nginx site configuration for KR GATE backend
# Place this in /etc/nginx/sites-available/gate and symlink to sites-enabled

server {
    listen 80;
    server_name gate.krgi.co.in;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 20M;
    keepalive_timeout 65;
    send_timeout 300s;

    location ^~ /.well-known/acme-challenge/ {
        root /home/iqac/IDCS-Restart/frontend/build;
        default_type text/plain;
        try_files $uri =404;
    }

    location /static/ {
        alias /home/iqac/IDCS-Restart/backend/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location /media/ {
        alias /home/iqac/IDCS-Restart/backend/media/;
        access_log off;
        expires 30d;
    }

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering on;
        proxy_buffers 16 16k;
        proxy_busy_buffers_size 64k;
        proxy_request_buffering on;
        proxy_pass http://unix:/run/gunicorn-krgate/gunicorn.sock;
    }
}

server {
    listen 443 ssl http2;
    server_name gate.krgi.co.in;

    ssl_certificate /home/iqac/IDCS-Restart/.letsencrypt/config/live/gate.krgi.co.in/fullchain.pem;
    ssl_certificate_key /home/iqac/IDCS-Restart/.letsencrypt/config/live/gate.krgi.co.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 20M;
    keepalive_timeout 65;
    send_timeout 300s;

    location ^~ /.well-known/acme-challenge/ {
        root /home/iqac/IDCS-Restart/frontend/build;
        default_type text/plain;
        try_files $uri =404;
    }

    location /static/ {
        alias /home/iqac/IDCS-Restart/backend/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location /media/ {
        alias /home/iqac/IDCS-Restart/backend/media/;
        access_log off;
        expires 30d;
    }

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering on;
        proxy_buffers 16 16k;
        proxy_busy_buffers_size 64k;
        proxy_request_buffering on;
        proxy_pass http://unix:/run/gunicorn-krgate/gunicorn.sock;
    }
}
